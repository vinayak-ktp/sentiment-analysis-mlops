apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  labels:
    app: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: 595868460079.dkr.ecr.us-east-1.amazonaws.com/flask-app
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1"
          env:
            - name: DAGSHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sentanal-secret
                  key: DAGSHUB_TOKEN
